<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Voice Notebook</title>
<style>
  :root {
    --bg: #F4F6F8;
    --surface: #FFFFFF;
    --ink: #12212E;
    --muted: #5C6B78;
    --line: #D8E0E6;
    --accent: #C7371F;   /* recording red */
    --accent-dark: #A82C17;
    --live: #1D5F9E;     /* words being spoken */
    --live-bg: #E4EFF9;
    --green: #1E7A3C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100dvh;
    overflow: hidden;
    font-size: 19px;
  }
  button { font-family: inherit; cursor: pointer; }
  .screen { display: none; height: 100dvh; flex-direction: column; }
  .screen.show { display: flex; }

  /* ============ LIST SCREEN ============ */
  #listHeader {
    padding: calc(env(safe-area-inset-top) + 18px) 20px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    text-align: center;
  }
  #listHeader h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.01em; }
  #listHeader p { color: var(--muted); font-size: 16px; margin-top: 4px; }

  #notesList { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 8px; }
  .note-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 12px;
    text-align: left;
    display: block;
  }
  .note-card:active { background: var(--live-bg); }
  .note-card .ntitle {
    font-size: 21px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .note-card .nmeta { font-size: 15px; color: var(--muted); margin-top: 5px; }
  #emptyMsg { text-align: center; color: var(--muted); padding: 44px 30px; font-size: 18px; line-height: 1.5; }

  #newNoteBtn {
    margin: 10px 16px calc(env(safe-area-inset-bottom) + 16px);
    padding: 20px;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    background: var(--ink);
    border: none;
    border-radius: 18px;
  }
  #newNoteBtn:active { opacity: 0.85; }

  /* ============ NOTE SCREEN ============ */
  #noteHeader {
    display: flex; align-items: center; gap: 10px;
    padding: calc(env(safe-area-inset-top) + 10px) 12px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  #backBtn {
    font-size: 19px; font-weight: 700;
    color: var(--live);
    background: none; border: none;
    padding: 10px 12px;
    flex-shrink: 0;
  }
  #titleInput {
    flex: 1; min-width: 0;
    font: inherit; font-size: 20px; font-weight: 700;
    border: none; outline: none; background: transparent; color: var(--ink);
  }
  #titleInput::placeholder { color: var(--muted); font-weight: 500; }

  #transcriptWrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #editor {
    max-width: 760px;
    margin: 0 auto;
    padding: 22px 22px 30px;
    font-size: 24px;
    line-height: 1.7;
    outline: none;
    white-space: pre-wrap;
    word-wrap: break-word;
    min-height: 200px;
  }
  #editor:empty::before { content: attr(data-placeholder); color: var(--muted); }
  .interim {
    color: var(--live);
    background: var(--live-bg);
    border-radius: 4px;
    padding: 0 2px;
  }

  #controls {
    background: var(--surface);
    border-top: 1px solid var(--line);
    padding: 14px 16px calc(env(safe-area-inset-bottom) + 14px);
    text-align: center;
  }
  #statusText { font-size: 18px; color: var(--muted); margin-bottom: 12px; min-height: 24px; }
  #statusText.live { color: var(--accent); font-weight: 700; }
  #micBtn {
    width: 96px; height: 96px;
    border-radius: 50%;
    border: none;
    background: var(--green);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(18,33,46,0.22);
  }
  #micBtn.recording { background: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
  #micBtn:active { transform: scale(0.96); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(199,55,31,0.45); }
    50% { box-shadow: 0 0 0 18px rgba(199,55,31,0); }
  }
  @media (prefers-reduced-motion: reduce) { #micBtn.recording { animation: none; } }
  #micLabel { display: block; font-size: 19px; font-weight: 700; margin-top: 10px; }
  #micLabel.rec { color: var(--accent); }

  #noteActions {
    display: flex; gap: 10px; justify-content: center; margin-top: 14px;
  }
  .small-btn {
    font-size: 17px; font-weight: 600;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
  }
  .small-btn:active { background: var(--bg); }
  .small-btn.danger { color: var(--accent); }
</style>
</head>
<body>

<!-- ============ SCREEN 1: NOTES LIST ============ -->
<div class="screen show" id="listScreen">
  <div id="listHeader">
    <h1>My Notes</h1>
    <p>Tap a note to open it</p>
  </div>
  <div id="notesList"></div>
  <button id="newNoteBtn">＋ &nbsp;New note</button>
</div>

<!-- ============ SCREEN 2: NOTE ============ -->
<div class="screen" id="noteScreen">
  <div id="noteHeader">
    <button id="backBtn">‹ Notes</button>
    <input id="titleInput" placeholder="Note title" aria-label="Note title">
  </div>

  <div id="transcriptWrap">
    <div id="editor" contenteditable="true" data-placeholder="Tap the green button below and start talking. Your words will appear here." aria-label="Transcript"></div>
  </div>

  <div id="controls">
    <div id="statusText">Ready</div>
    <button id="micBtn" aria-label="Start or stop talking">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
    </button>
    <span id="micLabel">Tap to start talking</span>
    <div id="noteActions">
      <button class="small-btn" id="shareBtn">Share</button>
      <button class="small-btn danger" id="deleteBtn">Delete</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";
  const $ = id => document.getElementById(id);
  const editor = $("editor"), titleInput = $("titleInput");
  const micBtn = $("micBtn"), micLabel = $("micLabel"), statusText = $("statusText");
  const INDEX_KEY = "vn-index";

  let files = [];
  let currentId = null;
  let saveTimer = null;

  /* ================= STORAGE =================
     Uses Claude's private storage when running inside the chat,
     otherwise saves directly on this device (Safari local storage).
     Either way, notes stay private and are never shared.        */
  const store = (function () {
    if (window.storage && typeof window.storage.get === "function") {
      return window.storage;
    }
    return {
      get: async (k) => {
        const v = localStorage.getItem(k);
        return v === null ? null : { key: k, value: v };
      },
      set: async (k, v) => { localStorage.setItem(k, v); return { key: k, value: v }; },
      delete: async (k) => { localStorage.removeItem(k); return { key: k, deleted: true }; }
    };
  })();

  async function loadIndex() {
    try { const r = await store.get(INDEX_KEY); files = r ? JSON.parse(r.value) : []; }
    catch (e) { files = []; }
  }
  async function saveIndex() {
    try { await store.set(INDEX_KEY, JSON.stringify(files)); } catch (e) {}
  }
  async function loadText(id) {
    try { const r = await store.get("vn-file-" + id); return r ? r.value : ""; }
    catch (e) { return ""; }
  }
  async function saveText(id, text) {
    try { await store.set("vn-file-" + id, text); } catch (e) {}
  }
  async function removeStored(id) {
    try { await store.delete("vn-file-" + id); } catch (e) {}
  }

  /* ================= NOTES ================= */
  function wordCount(t) { return (t.trim().match(/\S+/g) || []).length; }

  function renderList() {
    const list = $("notesList");
    list.innerHTML = "";
    files.sort((a, b) => b.updated - a.updated);
    if (!files.length) {
      const d = document.createElement("div");
      d.id = "emptyMsg";
      d.textContent = "No notes yet. Tap the black button below to make your first note.";
      list.appendChild(d);
      return;
    }
    for (const f of files) {
      const b = document.createElement("button");
      b.className = "note-card";
      b.innerHTML = '<div class="ntitle"></div><div class="nmeta"></div>';
      b.querySelector(".ntitle").textContent = f.title || "Untitled note";
      b.querySelector(".nmeta").textContent =
        new Date(f.updated).toLocaleDateString(undefined, { day: "numeric", month: "long", year: "numeric" })
        + "  ·  " + (f.words || 0) + " words";
      b.onclick = () => openNote(f.id);
      list.appendChild(b);
    }
  }

  function showScreen(name) {
    $("listScreen").classList.toggle("show", name === "list");
    $("noteScreen").classList.toggle("show", name === "note");
  }

  async function newNote() {
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    files.unshift({ id, title: "", updated: Date.now(), words: 0 });
    await saveIndex();
    await openNote(id);
  }

  async function openNote(id) {
    currentId = id;
    const meta = files.find(f => f.id === id);
    titleInput.value = meta ? meta.title : "";
    editor.textContent = await loadText(id);
    setStatus("Ready");
    showScreen("note");
  }

  async function commit() {
    if (!currentId) return;
    const meta = files.find(f => f.id === currentId);
    if (!meta) return;
    const text = getFinalText();
    meta.title = titleInput.value;
    meta.updated = Date.now();
    meta.words = wordCount(text);
    await saveText(currentId, text);
    await saveIndex();
  }
  function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(commit, 700); }

  function getFinalText() {
    const clone = editor.cloneNode(true);
    const s = clone.querySelector(".interim");
    if (s) s.remove();
    return clone.textContent;
  }

  /* ================= SPEECH (iOS-safe) =================
     iOS Safari quirks handled here:
     - Results are cumulative: every event can contain the WHOLE
       session transcript again. So we never append per-event;
       we rebuild the session text from scratch on every event.
     - Sessions end on their own after pauses: we auto-restart
       and fold finished text into the base first.
     - Interim results may never be marked "final": on stop we
       keep whatever was last heard.                          */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let recording = false;
  let baseText = "";        // text committed before / between sessions
  let sessionFinal = "";    // finalized text in current session
  let sessionInterim = "";  // still-changing text in current session
  let restartTimer = null;
  let wakeLock = null;

  function joiner(a, b) {
    if (!a || !b) return "";
    return /\s$/.test(a) ? "" : " ";
  }

  function renderTranscript() {
    const fin = baseText + joiner(baseText, sessionFinal) + sessionFinal;
    editor.textContent = fin;
    if (sessionInterim.trim()) {
      const span = document.createElement("span");
      span.className = "interim";
      span.textContent = joiner(fin, sessionInterim) + sessionInterim;
      editor.appendChild(span);
    }
    $("transcriptWrap").scrollTop = $("transcriptWrap").scrollHeight;
  }

  function setStatus(msg, live) {
    statusText.textContent = msg;
    statusText.classList.toggle("live", !!live);
  }

  function buildRecognition() {
    const r = new SR();
    r.lang = "en-US";
    r.interimResults = true;
    r.continuous = true;

    r.onresult = (event) => {
      // Rebuild from ALL results every time (iOS sends cumulative results)
      let fin = "", inter = "";
      for (let i = 0; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) fin += t;
        else inter += t;
      }
      sessionFinal = fin.trim();
      sessionInterim = inter;
      renderTranscript();
      setStatus("Listening — speak normally", true);
    };

    r.onerror = (e) => {
      if (e.error === "not-allowed" || e.error === "service-not-allowed") {
        recording = false;
        endSessionCleanup();
        setStatus("Microphone is blocked. Allow it in Settings › Safari › Microphone.");
      }
    };

    r.onend = () => {
      // Fold this session's text into the base, then restart if still recording
      const captured = (sessionFinal || sessionInterim).trim();
      if (captured) baseText = baseText + joiner(baseText, captured) + captured;
      sessionFinal = ""; sessionInterim = "";
      renderTranscript();
      if (recording) {
        clearTimeout(restartTimer);
        restartTimer = setTimeout(() => {
          if (!recording) return;
          try { recognition = buildRecognition(); recognition.start(); }
          catch (err) { stopRecording(); }
        }, 250);
      }
    };
    return r;
  }

  async function startRecording() {
    if (!SR) {
      setStatus("Voice input needs Safari on iPhone/iPad with Siri & Dictation turned on in Settings.");
      return;
    }
    baseText = getFinalText().trim();
    sessionFinal = ""; sessionInterim = "";
    editor.contentEditable = "false";   // avoid edit conflicts while talking
    editor.blur(); titleInput.blur();
    recording = true;
    micBtn.classList.add("recording");
    micLabel.textContent = "Tap to stop";
    micLabel.classList.add("rec");
    setStatus("Listening — speak normally", true);
    try { recognition = buildRecognition(); recognition.start(); }
    catch (e) { stopRecording(); setStatus("Could not start the microphone. Please try again."); return; }
    try { if (navigator.wakeLock) wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
  }

  function endSessionCleanup() {
    clearTimeout(restartTimer);
    micBtn.classList.remove("recording");
    micLabel.textContent = "Tap to start talking";
    micLabel.classList.remove("rec");
    editor.contentEditable = "true";
    if (wakeLock) { try { wakeLock.release(); } catch (e) {} wakeLock = null; }
  }

  function stopRecording() {
    if (!recording) { endSessionCleanup(); return; }
    recording = false;
    // Keep whatever was last heard, even if iOS never marked it final
    const captured = (sessionFinal || sessionInterim).trim();
    if (captured) baseText = baseText + joiner(baseText, captured) + captured;
    sessionFinal = ""; sessionInterim = "";
    if (recognition) { try { recognition.abort(); } catch (e) {} }
    renderTranscript();
    endSessionCleanup();
    setStatus("Saved ✓");
    commit();
  }

  /* ================= EVENTS ================= */
  micBtn.onclick = () => recording ? stopRecording() : startRecording();
  $("newNoteBtn").onclick = newNote;
  $("backBtn").onclick = async () => {
    stopRecording();
    await commit();
    renderList();
    showScreen("list");
  };
  titleInput.oninput = scheduleSave;
  editor.addEventListener("input", scheduleSave);

  $("shareBtn").onclick = async () => {
    const text = getFinalText();
    const title = titleInput.value || "My note";
    if (navigator.share) {
      try { await navigator.share({ title, text }); return; } catch (e) { if (e.name === "AbortError") return; }
    }
    const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = title + ".txt";
    a.click();
    URL.revokeObjectURL(a.href);
  };

  $("deleteBtn").onclick = async () => {
    if (!currentId) return;
    if (!confirm("Delete this note? This cannot be undone.")) return;
    stopRecording();
    const id = currentId;
    files = files.filter(f => f.id !== id);
    await removeStored(id);
    await saveIndex();
    currentId = null;
    renderList();
    showScreen("list");
  };

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && recording) stopRecording();
  });
  window.addEventListener("pagehide", () => { if (currentId) commit(); });

  /* ================= INIT ================= */
  (async function init() {
    await loadIndex();
    renderList();
  })();
})();
</script>
</body>
</html>
